<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben from Richmond</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #1a252f, #0f161f);
            color: white;
            text-align: center;
            padding: 50px;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
        p {
            font-size: 1.4rem;
            max-width: 600px;
            margin: 20px auto;
            opacity: 0.95;
        }
        button {
            background: #e74c3c;
            color: white;
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }
        button:hover {
            transform: scale(1.08);
            background: #c0392b;
        }
        #message {
            font-size: 1.5rem;
            margin-top: 30px;
            min-height: 50px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body>
    <h1>Hey, I'm Ben 👋</h1>
    <p>From Richmond, British Columbia</p>
    <p>This is my first webpage — now in dark mode!</p>
    
    <button onclick="sayHello()">Click me!</button>
    
    <div id="message"></div>

    <script>
        function sayHello() {
            const messages = [
                "Hello from Richmond! 🌲",
                "You're doing awesome learning this! 🚀",
                "Grok is helping me code 💪",
                "British Columbia rocks! 🏔️",
                "Keep going, Ben! You're crushing it!"
            ];
            
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById("message").textContent = randomMessage;
        }
    </script>
</body>
</html>
